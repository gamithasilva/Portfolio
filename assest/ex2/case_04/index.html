<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 400px;
            height: 400px;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .drop {
            width: 150px;
            height: 150px;
            background: transparent;
            border: 5px solid #333; /* water drop eka */
            border-radius: 50%; /* circle */
            position: absolute;
            /* animation eka connect karanna */
            animation: waterDrop 2s infinite ease-out;
        }

        /* water drop (Animation) */
        @keyframes waterDrop {
            0% {
                width: 0;
                height: 0;
                opacity: 1;
                border-width: 10px;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
                border-width: 1px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="drop"></div>
</div>

</body>
</html>
