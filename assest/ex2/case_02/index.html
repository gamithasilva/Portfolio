<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right, #007bff, #00c6ff);
            margin: 0;
        }

        .circle-container {
            position: relative;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .rotate-border {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid transparent;
            border-top: 8px solid #ff4d4d;
            transition: transform 0.6s ease-in-out;
        }

        /* in gray */
        .inner-circle {
            width: 160px;
            height: 160px;
            background-color: #777;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            z-index: 1;
            border: 8px solid white;
        }

        /* Hover wena animation eka */
        .circle-container:hover .rotate-border {
            transform: rotate(360deg);
        }
    </style>
</head>
<body>
<div class="circle-container">
    <div class="rotate-border"></div>
    <div class="inner-circle">
        <span>RWAD</span>
    </div>
</div>
</body>
</html>
