<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Animation - Final Fixed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        /* 1. Sky Background (sky.jpg) */
        .animation-container {
            height: 100vh;
            width: 100%;
            position: relative;
            background-image: url('assets/sky.jpg');
            background-size: cover;
            background-position: center;
        }

        /* 2. City Skyline (city.png) */
        .city {
            height: 250px;
            width: 500%;
            background-image: url('assets/city.png');
            position: absolute;
            bottom: 200px;
            left: 0;
            background-repeat: repeat-x;
            animation: cityScroll 25s linear infinite;
        }

        /* 3. Moving Road (road.jpg) */
        .road {
            height: 200px;
            width: 500%;
            background-image: url('assets/road.jpg');
            position: absolute;
            bottom: 0;
            left: 0;
            background-repeat: repeat-x;
            animation: roadScroll 5s linear infinite;
            z-index: 5;
        }

        /* 4. Car Wrapper */
        .car-wrapper {
            width: 400px;
            position: absolute;
            left: 10%;
            bottom: 45px;
            z-index: 10;
        }

        /* Car Body (car.png) */
        .car-body {
            width: 100%;
            display: block;
            position: relative;
            z-index: 2;
        }

        /* 5. Wheels (wheel.png) */
        .wheel {
            width: 72px;
            position: absolute;
            bottom: -2px;
            z-index: 3;
            animation: wheelRotate 0.6s linear infinite;
        }

        /* wheel deka Back & Front */
        .back-wheel {
            left: 44px;
        }

        .front-wheel {
            right: 46px;
        }

        /* Animations */

        /* city eka slowly yanna */
        @keyframes cityScroll {
            100% { transform: translateX(-1400px); }
        }

        /* road eka wegayen yanna */
        @keyframes roadScroll {
            100% { transform: translateX(-1400px); }
        }

        /* wheel karakenna */
        @keyframes wheelRotate {
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

<div class="animation-container">
    <div class="city"></div>

    <div class="road"></div>

    <div class="car-wrapper">
        <img src="assets/car.png" alt="Car" class="car-body">

        <img src="assets/wheel.png" alt="Back Wheel" class="wheel back-wheel">

        <img src="assets/wheel.png" alt="Front Wheel" class="wheel front-wheel">
    </div>
</div>

</body>
</html>
