<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }

        /* 01. & 04. Fixed container to ensure design doesn't break on resize */
        .main-container {
            position: relative;
            width: 800px;
            height: 400px;
            background-color: white;
            border: 2px solid #555;
            overflow: hidden; /* Clips the corner circles */
        }

        /* 02. Quadrant Layout */
        .quad {
            position: absolute;
            width: 50%;
            height: 50%;
        }
        .red { top: 0; left: 0; background-color: red; }
        .green { top: 0; right: 0; background-color: green; }
        .orange { bottom: 0; left: 0; background-color: orange; }
        .pink { bottom: 0; right: 0; background-color: deeppink; }

        /* White Corner/Edge Circles */
        .corner {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 50%;
            z-index: 1;
        }
        .top-left { top: -50px; left: -50px; }
        .top-right { top: -50px; right: -50px; }
        .bottom-left { bottom: -50px; left: -50px; }
        .bottom-right { bottom: -50px; right: -50px; }
        .top-center { top: -50px; left: 50%; transform: translateX(-50%); }
        .bottom-center { bottom: -50px; left: 50%; transform: translateX(-50%); }

        /* Inner white circles with red squares */
        .circle-box {
            position: absolute;
            width: 120px;
            height: 120px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        .pos-tl { top: 25%; left: 25%; transform: translate(-50%, -50%); }
        .pos-tr { top: 25%; right: 25%; transform: translate(50%, -50%); }
        .pos-bl { bottom: 25%; left: 25%; transform: translate(-50%, 50%); }
        .pos-br { bottom: 25%; right: 25%; transform: translate(50%, 50%); }

        .inner-rect {
            width: 40px;
            height: 40px;
            background-color: red;
        }

        /* The Absolute Center Piece */
        .center-white-square {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100px;
            height: 100px;
            background-color: white;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3;
        }

        .center-red-circle {
            width: 60px;
            height: 60px;
            background-color: red;
            border-radius: 50%;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="quad red"></div>
    <div class="quad green"></div>
    <div class="quad orange"></div>
    <div class="quad pink"></div>

    <div class="corner top-left"></div>
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <div class="corner bottom-right"></div>
    <div class="corner top-center"></div>
    <div class="corner bottom-center"></div>

    <div class="circle-box pos-tl"><div class="inner-rect"></div></div>
    <div class="circle-box pos-tr"><div class="inner-rect"></div></div>
    <div class="circle-box pos-bl"><div class="inner-rect"></div></div>
    <div class="circle-box pos-br"><div class="inner-rect"></div></div>

    <div class="center-white-square">
        <div class="center-red-circle"></div>
    </div>
</div>
</body>
</html>

</body>
</html>
